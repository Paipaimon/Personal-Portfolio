<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0">
    <meta charset="utf-8">
    <title>🚀 CPS测试器 - 点击速度挑战</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .stats-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 200px;
            transition: all 0.3s ease;
        }

        .stats-title {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.9rem;
        }

        #switch_time {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        #show_time_title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        #set_time {
            color: #4ecdc4;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .time-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-option {
            position: relative;
        }

        .time-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .time-option label {
            display: block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid transparent;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            min-width: 80px;
        }

        .time-option label:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .time-option input[type="radio"]:checked + label {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }

        #box {
            width: min(600px, 90vw);
            height: min(400px, 60vh);
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        #box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        #box:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        #box:hover::before {
            opacity: 1;
            animation: shine 0.6s ease-in-out;
        }

        #box:active {
            transform: translateY(-2px) scale(0.98);
        }

        .click-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #show_time {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #show_time_font {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #number {
            font-size: 4rem;
            font-weight: bold;
            color: #4ecdc4;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        #title {
            font-size: 2rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .result-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            animation: modalSlideIn 0.5s ease-out;
        }

        .result-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #4ecdc4;
        }

        .result-cps {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .result-details {
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .result-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .result-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .result-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .click-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #4ecdc4;
            border-radius: 50%;
            pointer-events: none;
            animation: clickRipple 0.6s ease-out;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.1s ease;
            border-radius: 0 0 25px 25px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes clickRipple {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .keyboard-hints {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 180px;
        }

        .hint-title {
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.9rem;
        }

        .hint-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 0.8rem;
            gap: 8px;
        }

        .hint-item kbd {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-family: monospace;
            min-width: 24px;
            text-align: center;
        }

        .leaderboard-content {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            display: grid;
            grid-template-columns: 50px 1fr 60px 80px;
            gap: 10px;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .leaderboard-item .rank {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .leaderboard-item .cps {
            font-size: 1.1rem;
            font-weight: bold;
            color: #4ecdc4;
        }

        .leaderboard-item .duration {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }

        .leaderboard-item .date {
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: right;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }
            
            .stats-panel {
                position: relative;
                top: auto;
                right: auto;
                margin-bottom: 20px;
                width: 90%;
            }
            
            .keyboard-hints {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 20px;
                width: 90%;
            }
            
            .time-options {
                gap: 10px;
            }
            
            .time-option label {
                padding: 10px 16px;
                min-width: 60px;
                font-size: 0.9rem;
            }
            
            #box {
                height: min(350px, 50vh);
            }
            
            #number {
                font-size: 3rem;
            }
            
            #show_time {
                font-size: 2.5rem;
            }
            
            .controls {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 20px;
                justify-content: center;
            }
        }
    </style>
    <script type="text/javascript">
        let timer = 0;
        let number = 0;
        let setTime = 10;
        let showTimeNum;
        let timeoutId;
        let isRunning = false;
        let startTime;
        let bestCPS = localStorage.getItem('bestCPS') || 0;
        let totalTests = localStorage.getItem('totalTests') || 0;
        let totalClicks = localStorage.getItem('totalClicks') || 0;
        let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
        let currentTheme = localStorage.getItem('theme') || 'default';
        let leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]');

        // 音效
        function playClickSound() {
            if (!soundEnabled) return;
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }

        // 切换音效
        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('soundEnabled', soundEnabled);
            updateSoundButton();
        }

        function updateSoundButton() {
            const btn = document.getElementById('sound-btn');
            if (btn) {
                btn.innerHTML = soundEnabled ? '🔊 音效' : '🔇 静音';
                btn.title = soundEnabled ? '关闭音效' : '开启音效';
            }
        }

        // 创建点击特效
        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = (x - 50) + 'px';
            effect.style.top = (y - 50) + 'px';
            document.getElementById('box').appendChild(effect);
            
            setTimeout(() => {
                effect.remove();
            }, 600);
        }

        // 更新统计面板
        function updateStats() {
            document.getElementById('best-cps').textContent = parseFloat(bestCPS).toFixed(2);
            document.getElementById('total-tests').textContent = totalTests;
            document.getElementById('total-clicks').textContent = totalClicks;
        }

        // 设置时间函数
        function setTimeValue(seconds) {
            if (isRunning) return;
            setTime = seconds;
            document.getElementById("set_time").innerText = setTime;
            
            // 更新选中状态
            document.querySelectorAll('input[name="switchTime"]').forEach(radio => {
                radio.checked = false;
            });
            document.getElementById(seconds + 's').checked = true;
        }

        function setTime1s() { setTimeValue(1); }
        function setTime2s() { setTimeValue(2); }
        function setTime5s() { setTimeValue(5); }
        function setTime10s() { setTimeValue(10); }

        function clicked(event) {
            if (isRunning) {
                number++;
                document.getElementById("number").innerText = number;
                
                // 播放音效和特效
                playClickSound();
                createClickEffect(event.offsetX, event.offsetY);
                
                // 更新进度条
                const elapsed = (Date.now() - startTime) / 1000;
                const progress = Math.min((elapsed / setTime) * 100, 100);
                document.querySelector('.progress-bar').style.width = progress + '%';
                
                return;
            }
            
            // 开始测试
            startTest();
            number++;
            document.getElementById("number").innerText = number;
            playClickSound();
            createClickEffect(event.offsetX, event.offsetY);
        }

        function startTest() {
            isRunning = true;
            startTime = Date.now();
            document.getElementById("switch_time").style.display = "none";
            document.getElementById("title").innerText = "疯狂点击!";
            
            timeoutId = setTimeout(endTest, setTime * 1000);
            showTimeNum = setInterval(showTime, 10);
            
            // 显示进度条
            const progressBar = document.querySelector('.progress-bar');
            progressBar.style.width = '0%';
        }

        function endTest() {
            isRunning = false;
            clearInterval(showTimeNum);
            clearTimeout(timeoutId);
            
            const cps = (number / setTime).toFixed(2);
            const currentCPS = parseFloat(cps);
            
            // 更新统计数据
            totalTests = parseInt(totalTests) + 1;
            totalClicks = parseInt(totalClicks) + number;
            
            if (currentCPS > parseFloat(bestCPS)) {
                bestCPS = currentCPS;
                localStorage.setItem('bestCPS', bestCPS);
            }
            
            localStorage.setItem('totalTests', totalTests);
            localStorage.setItem('totalClicks', totalClicks);
            
            // 更新排行榜
            updateLeaderboard(currentCPS, setTime);
            
            showResult(cps, currentCPS > parseFloat(bestCPS));
        }

        function showResult(cps, isNewRecord) {
            const modal = document.getElementById('result-modal');
            const cpsElement = document.getElementById('result-cps');
            const detailsElement = document.getElementById('result-details');
            
            cpsElement.textContent = cps + ' CPS';
            
            let performance = '';
            const cpsNum = parseFloat(cps);
            if (cpsNum >= 10) performance = '🔥 超神级别!';
            else if (cpsNum >= 8) performance = '⚡ 闪电手速!';
            else if (cpsNum >= 6) performance = '🚀 极速点击!';
            else if (cpsNum >= 4) performance = '👍 不错的速度!';
            else performance = '💪 继续加油!';
            
            detailsElement.innerHTML = `
                <div style="margin-bottom: 10px;">${performance}</div>
                <div>总点击: ${number} 次</div>
                <div>测试时长: ${setTime} 秒</div>
                <div>平均间隔: ${(setTime * 1000 / number).toFixed(0)} 毫秒</div>
                ${isNewRecord ? '<div style="color: #4ecdc4; font-weight: bold; margin-top: 10px;">🎉 新纪录!</div>' : ''}
            `;
            
            modal.style.display = 'flex';
            updateStats();
        }

        function showTime() {
            timer++;
            const elapsed = (timer / 100).toFixed(2);
            document.getElementById("show_time").innerText = elapsed;
            
            // 更新进度条
            const progress = Math.min((parseFloat(elapsed) / setTime) * 100, 100);
            document.querySelector('.progress-bar').style.width = progress + '%';
        }

        function restartTest() {
            document.getElementById('result-modal').style.display = 'none';
            resetTest();
        }

        function resetTest() {
            timer = 0;
            number = 0;
            isRunning = false;
            
            clearInterval(showTimeNum);
            clearTimeout(timeoutId);
            
            document.getElementById("switch_time").style.display = "block";
            document.getElementById("number").innerText = "0";
            document.getElementById("show_time").innerText = "0.00";
            document.getElementById("title").innerText = "点击开始";
            document.querySelector('.progress-bar').style.width = '0%';
        }

        function clearStats() {
            if (confirm('确定要清除所有统计数据吗？')) {
                localStorage.removeItem('bestCPS');
                localStorage.removeItem('totalTests');
                localStorage.removeItem('totalClicks');
                localStorage.removeItem('leaderboard');
                bestCPS = 0;
                totalTests = 0;
                totalClicks = 0;
                leaderboard = [];
                updateStats();
            }
        }

        // 排行榜功能
        function updateLeaderboard(cps, duration) {
            const record = {
                cps: parseFloat(cps),
                duration: duration,
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString()
            };
            
            leaderboard.push(record);
            leaderboard.sort((a, b) => b.cps - a.cps);
            leaderboard = leaderboard.slice(0, 10); // 只保留前10名
            
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
        }

        function showLeaderboard() {
            const modal = document.getElementById('leaderboard-modal');
            const content = document.getElementById('leaderboard-content');
            
            if (leaderboard.length === 0) {
                content.innerHTML = '<p style="text-align: center; opacity: 0.7;">暂无记录</p>';
            } else {
                let html = '<div class="leaderboard-list">';
                leaderboard.forEach((record, index) => {
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                    html += `
                        <div class="leaderboard-item">
                            <span class="rank">${medal}</span>
                            <span class="cps">${record.cps.toFixed(2)} CPS</span>
                            <span class="duration">${record.duration}秒</span>
                            <span class="date">${record.date}</span>
                        </div>
                    `;
                });
                html += '</div>';
                content.innerHTML = html;
            }
            
            modal.style.display = 'flex';
        }

        // 显示统计信息
        function showStats() {
            // 关闭结果模态框
            document.getElementById('result-modal').style.display = 'none';
            
            // 结束当前测试
            resetTest();
            
            // 高亮统计面板
            const statsPanel = document.querySelector('.stats-panel');
            statsPanel.style.animation = 'none';
            statsPanel.style.transform = 'scale(1.05)';
            statsPanel.style.boxShadow = '0 0 30px rgba(78, 205, 196, 0.6)';
            statsPanel.style.border = '2px solid #4ecdc4';
            
            // 2秒后恢复正常
            setTimeout(() => {
                statsPanel.style.transform = 'scale(1)';
                statsPanel.style.boxShadow = '';
                statsPanel.style.border = '1px solid rgba(255, 255, 255, 0.2)';
            }, 2000);
            
            // 更新统计数据
            updateStats();
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && !isRunning) {
                e.preventDefault();
                const event = new MouseEvent('click', {
                    bubbles: true,
                    cancelable: true,
                    offsetX: 300,
                    offsetY: 200
                });
                document.getElementById('box').dispatchEvent(event);
            } else if (e.key >= '1' && e.key <= '4' && !isRunning) {
                const times = [1, 2, 5, 10];
                setTimeValue(times[parseInt(e.key) - 1]);
            } else if (e.key === 'r' || e.key === 'R') {
                // 检查是否有模态框打开，如果有则不执行重置
                const resultModal = document.getElementById('result-modal');
                const leaderboardModal = document.getElementById('leaderboard-modal');
                if (resultModal.style.display === 'flex' || leaderboardModal.style.display === 'flex') {
                    return;
                }
                e.preventDefault();
                resetTest();
            } else if (e.key === 'Escape') {
                const resultModal = document.getElementById('result-modal');
                const leaderboardModal = document.getElementById('leaderboard-modal');
                if (resultModal.style.display === 'flex') {
                    resultModal.style.display = 'none';
                } else if (leaderboardModal.style.display === 'flex') {
                    leaderboardModal.style.display = 'none';
                }
            }
        });

        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            updateStats();
            updateSoundButton();
            
            // 默认选中10秒
            document.getElementById('10s').checked = true;
        });
    </script>
</head>
<body>
    <!-- 统计面板 -->
    <div class="stats-panel">
        <div class="stats-title">📊 统计数据</div>
        <div class="stat-item">
            <span>最佳成绩:</span>
            <span id="best-cps">0.00</span>
        </div>
        <div class="stat-item">
            <span>测试次数:</span>
            <span id="total-tests">0</span>
        </div>
        <div class="stat-item">
            <span>总点击数:</span>
            <span id="total-clicks">0</span>
        </div>
    </div>

    <!-- 主标题 -->
    <div class="header">
        <h1 class="main-title">🚀 CPS 测试器</h1>
        <p class="subtitle">测试你的点击速度极限！</p>
    </div>

    <!-- 时间选择 -->
    <div id="switch_time">
        <div id="show_time_title">
            <span id="set_time">10</span>秒钟点击速度测试
        </div>
        <div class="time-options">
            <div class="time-option">
                <input type="radio" name="switchTime" id="1s" onclick="setTime1s()">
                <label for="1s">1秒</label>
            </div>
            <div class="time-option">
                <input type="radio" name="switchTime" id="2s" onclick="setTime2s()">
                <label for="2s">2秒</label>
            </div>
            <div class="time-option">
                <input type="radio" name="switchTime" id="5s" onclick="setTime5s()">
                <label for="5s">5秒</label>
            </div>
            <div class="time-option">
                <input type="radio" name="switchTime" id="10s" onclick="setTime10s()">
                <label for="10s">10秒</label>
            </div>
        </div>
    </div>

    <!-- 点击区域 -->
    <div id="box" onclick="clicked(event)">
        <div class="click-area">
            <div id="show_time">0.00</div>
            <div id="show_time_font">秒</div>
            <div id="number">0</div>
            <div id="title">点击开始</div>
        </div>
        <div class="progress-bar"></div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <button class="control-btn" onclick="resetTest()" title="重置测试 (R)">🔄 重置</button>
        <button class="control-btn" onclick="clearStats()" title="清除统计">🗑️ 清除</button>
        <button class="control-btn" id="sound-btn" onclick="toggleSound()" title="切换音效">🔊 音效</button>
        <button class="control-btn" onclick="showLeaderboard()" title="查看排行榜">🏆 排行榜</button>
    </div>

    <!-- 结果模态框 -->
    <div id="result-modal" class="result-modal">
        <div class="result-content">
            <h2 class="result-title">🎯 测试结果</h2>
            <div id="result-cps" class="result-cps">0.00 CPS</div>
            <div id="result-details" class="result-details"></div>
            <div class="result-buttons">
                <button class="result-btn btn-primary" onclick="restartTest()">🔄 再次测试</button>
                <button class="result-btn btn-secondary" onclick="showStats()">📊 查看统计</button>
            </div>
        </div>
    </div>

    <!-- 键盘提示 -->
    <div class="keyboard-hints">
        <div class="hint-title">⌨️ 快捷键</div>
        <div class="hint-item"><kbd>空格</kbd> 开始测试</div>
        <div class="hint-item"><kbd>1-4</kbd> 选择时间</div>
        <div class="hint-item"><kbd>R</kbd> 重置测试</div>
        <div class="hint-item"><kbd>ESC</kbd> 关闭弹窗</div>
    </div>

    <!-- 排行榜模态框 -->
    <div id="leaderboard-modal" class="result-modal">
        <div class="result-content" style="max-width: 500px;">
            <h2 class="result-title">🏆 排行榜</h2>
            <div id="leaderboard-content" class="leaderboard-content"></div>
            <div class="result-buttons">
                <button class="result-btn btn-secondary" onclick="document.getElementById('leaderboard-modal').style.display='none'">关闭</button>
            </div>
        </div>
    </div>
</body>
</html>
